name: Update docs on main
on:
  push:
    branches:
      - main

jobs:
  # Check if deploying docs for a release or not. A release commit will have a `vX.Y.Z` tag on the
  # commit, while other commits on the main branch will not and just use 'main' as the version.
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo 'main')
          echo "Resolved version: $TAG"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  call-deploy-github-pages:
    needs: get-version
    uses: ./.github/workflows/deploy-github-pages.yml
    secrets: inherit
    with:
      version: ${{ needs.get-version.outputs.version }}
