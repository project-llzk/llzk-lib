added:
  - Add interval analysis support for `arith.select` and `arith.xori`.
  - Add interval analysis support and coverage for `felt.uintdiv`, `felt.sintdiv`, and `felt.bit_or`.

changed:
  - Clarify `felt.div` as finite-field division in the op documentation and model it in interval analysis using multiplicative inverses.
  - Limit precise `felt.div` interval propagation to non-zero constant divisors, with conservative fallback behavior for non-degenerate divisor intervals.

fixed:
  - Preserve boolean SMT sorts when over-approximating unknown values in interval analysis, avoiding sort-mismatch failures in boolean `arith.select` cases.
  - Add focused compute-pass and unit-test coverage for division-related and bitwise interval analysis behavior, including negative signed division results and finite-field division semantics.
  - Treat external `function.call` results as SourceRef roots so member and array accesses through external-call values remain trackable in SourceRef-based analyses.
  - Disambiguate printed external-call SourceRefs using their SSA result values, and add regression coverage for repeated extern call sites.
